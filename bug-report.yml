name: 🐛 Bug-Report
description: Etwas funktioniert nicht richtig.
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: Was ist passiert?
      description: Klare und knappe Beschreibung des Bugs.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Was hättest du erwartet?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Schritte zur Reproduktion
      placeholder: |
        1. App öffnen
        2. Tippe auf...
        3. Swipe...
        4. Fehler erscheint
    validations:
      required: true

  - type: dropdown
    id: device_type
    attributes:
      label: Gerät
      options:
        - Mobile (Android)
        - Mobile (iOS)
        - Desktop
        - Tablet
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser & Version
      placeholder: z.B. "Chrome 138 auf Android 15"
    validations:
      required: true

  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot oder Bildschirmaufnahme
      description: Bilder hier reinziehen. Optional, aber bei visuellen Bugs sehr hilfreich.

  - type: textarea
    id: console
    attributes:
      label: Browser-Konsole-Fehler (falls vorhanden)
      description: DevTools öffnen → Console. Rote Fehlermeldungen hier reinkopieren.
      render: text
