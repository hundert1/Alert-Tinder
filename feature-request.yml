name: 💡 Feature-Vorschlag
description: Schlage ein neues Feature oder eine Verbesserung vor.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Welches Problem löst das?
      description: Welcher Schmerzpunkt oder welche Einschränkung soll adressiert werden?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Vorgeschlagene Lösung
      description: Wie soll es funktionieren?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternativen, die du überlegt hast (optional)
      description: Gibt es andere Wege, das zu lösen?

  - type: dropdown
    id: scope
    attributes:
      label: Grober Umfang
      description: Wie groß ist diese Änderung?
      options:
        - Klein (UI-Tweak, kleine Ergänzung)
        - Mittel (neues Feature, Modal, Modus)
        - Groß (architektonische Änderung, Multiplayer, Backend, etc.)
    validations:
      required: true

  - type: checkboxes
    id: discuss_first
    attributes:
      label: Größere Features
      options:
        - label: Bei großen Änderungen verstehe ich, dass es besser ist, zuerst eine [Discussion](https://github.com/hundert1/alert-tinder/discussions) zu eröffnen, bevor PR-Arbeit reingesteckt wird.
